name: Deploy to GitHub Pages

on:
  # Triggered manually from the CLI or GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm Pages is up to date
        run: echo "Dashboard is live at https://atriveo-airflow.github.io/"
