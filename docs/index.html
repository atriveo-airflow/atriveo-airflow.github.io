<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atriveo · Job Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f2f5fc;
      --surface:      #ffffff;
      --surface-2:    #f8faff;
      --border:       #e2e8f5;
      --border-hover: #bfcfee;
      --text:         #111827;
      --text-2:       #374151;
      --muted:        #6b7280;
      --accent:       #0066FF;
      --accent-2:     #3385FF;
      --accent-bg:    #eff6ff;
      --accent-bd:    #bfdbfe;
      --green:        #059669;
      --green-bg:     #ecfdf5;
      --orange:       #d97706;
      --orange-bg:    #fffbeb;
      --red:          #dc2626;
      --radius:       12px;
      --radius-sm:    7px;
      --shadow:       0 1px 3px rgba(0,20,80,0.06), 0 1px 2px rgba(0,20,80,0.04);
      --shadow-md:    0 4px 16px rgba(0,20,80,0.09);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .wrapper { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 30;
      box-shadow: 0 1px 4px rgba(0,20,80,0.06);
    }

    .header-inner {
      display: flex; align-items: center;
      justify-content: space-between;
      height: 54px; gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 9px; }

    .logo-icon {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
    }

    .logo-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .logo-sub  { font-size: 11px; color: var(--muted); }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .last-run {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }

    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .admin-link {
      font-size: 12px; font-weight: 500;
      color: var(--muted);
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color 0.15s, color 0.15s;
    }
    .admin-link:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

    /* ── Page ── */
    .page { padding: 22px 0 52px; }

    /* ── KPI row ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    @media (max-width: 680px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px 14px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: ""; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--border);
    }
    .kpi-card.blue::before   { background: var(--accent); }
    .kpi-card.green::before  { background: var(--green); }
    .kpi-card.orange::before { background: var(--orange); }

    .kpi-value {
      font-size: 30px; font-weight: 700;
      color: var(--text); line-height: 1;
      margin-bottom: 5px;
    }
    .kpi-card.blue   .kpi-value { color: var(--accent); }
    .kpi-card.green  .kpi-value { color: var(--green); }
    .kpi-card.orange .kpi-value { color: var(--orange); }

    .kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Period + sort bar ── */
    .top-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .period-tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
      box-shadow: var(--shadow);
    }

    .period-tab {
      padding: 6px 16px;
      border-radius: 5px;
      border: none; background: none;
      font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .period-tab:hover { background: var(--bg); color: var(--text-2); }
    .period-tab.active {
      background: var(--accent);
      color: #fff;
    }
    .period-tab .count {
      font-size: 11px; margin-left: 4px;
      opacity: 0.75;
    }

    .sort-group {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px; gap: 2px;
      box-shadow: var(--shadow);
    }

    .sort-btn {
      padding: 5px 12px; border-radius: 5px;
      border: none; background: none;
      font-size: 12px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .sort-btn:hover { background: var(--bg); color: var(--text-2); }
    .sort-btn.active { background: var(--surface-2); color: var(--text); }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1; min-width: 200px;
      position: relative;
    }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 14px;
    }
    .search-input {
      width: 100%; padding: 8px 12px 8px 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: 13px; color: var(--text);
      outline: none;
      box-shadow: var(--shadow);
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent-bd); }
    .search-input::placeholder { color: var(--muted); }

    .level-chips { display: flex; gap: 5px; flex-wrap: wrap; }

    .chip {
      padding: 5px 12px; border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent-bd); color: var(--accent); }
    .chip.active { background: var(--accent-bg); border-color: var(--accent-bd); color: var(--accent); font-weight: 600; }

    /* ── Result meta ── */
    .result-meta {
      font-size: 12px; color: var(--muted);
      margin-bottom: 10px;
      min-height: 18px;
    }

    /* ── Job cards ── */
    .job-list { display: flex; flex-direction: column; gap: 7px; }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 38px 1fr auto;
      align-items: center;
      gap: 0 14px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
      text-decoration: none; color: inherit;
    }
    .job-card:hover {
      border-color: var(--accent-bd);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .job-card.top { border-left: 3px solid var(--accent); }

    /* Avatar */
    .avatar {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    /* Middle */
    .job-main {}
    .job-title {
      font-size: 14px; font-weight: 600;
      color: var(--text); margin-bottom: 4px;
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .job-meta {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .job-meta .sep { color: var(--border); }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 7px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
    }
    .badge-ng     { background: var(--green-bg);   color: var(--green); }
    .badge-entry  { background: var(--accent-bg);   color: var(--accent); }
    .badge-mid    { background: var(--orange-bg);   color: var(--orange); }
    .badge-new    { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .badge-h1b    { background: #f0fdf4; color: #166534; font-size: 10px; }
    .badge-pri    { background: var(--accent-bg);   color: var(--accent-2); font-size: 10px; }

    /* Right side */
    .job-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px;
    }
    .job-score {
      display: flex; align-items: center; gap: 3px;
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .job-score .star { color: var(--accent); font-size: 12px; }
    .score-hi { color: var(--accent); }
    .score-md { color: var(--orange); }

    .apply-btn {
      padding: 6px 14px; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff;
      font-size: 12px; font-weight: 600;
      border: none; cursor: pointer; white-space: nowrap;
      transition: background 0.15s;
      text-decoration: none;
    }
    .apply-btn:hover { background: var(--accent-2); text-decoration: none; color: #fff; }

    /* ── Loading / empty ── */
    .state-msg {
      text-align: center; padding: 52px 20px;
      color: var(--muted); font-size: 14px;
    }
    .state-msg .icon { font-size: 36px; margin-bottom: 10px; }
    .state-msg .sub  { font-size: 12px; margin-top: 6px; opacity: 0.7; }

    /* ── Footer ── */
    footer { padding: 28px 0; text-align: center; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
    footer a { color: var(--muted); }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      .job-card { grid-template-columns: 32px 1fr; }
      .job-right { display: none; }
      .job-title { font-size: 13px; }
    }
  </style>
</head>
<body>

<header>
  <div class="wrapper header-inner">
    <div class="logo">
      <div class="logo-icon">A</div>
      <div>
        <div class="logo-name">Atriveo</div>
        <div class="logo-sub">Job Feed</div>
      </div>
    </div>
    <div class="header-right">
      <div class="last-run">
        <div class="pulse"></div>
        <span id="last-run-text">—</span>
      </div>
      <a class="admin-link" href="/admin/">Analytics →</a>
    </div>
  </div>
</header>

<div class="wrapper">
<div class="page">

  <!-- KPIs -->
  <div class="kpi-row">
    <div class="kpi-card blue">
      <div class="kpi-value" id="kpi-hour">—</div>
      <div class="kpi-label">This Hour</div>
      <div class="kpi-sub" id="kpi-hour-sub">&nbsp;</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-value" id="kpi-today">—</div>
      <div class="kpi-label">Today Total</div>
      <div class="kpi-sub" id="kpi-today-sub">&nbsp;</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value" id="kpi-newgrad">—</div>
      <div class="kpi-label">New Grad</div>
      <div class="kpi-sub">across all today</div>
    </div>
    <div class="kpi-card orange">
      <div class="kpi-value" id="kpi-score">—</div>
      <div class="kpi-label">Best Score</div>
      <div class="kpi-sub" id="kpi-score-sub">&nbsp;</div>
    </div>
  </div>

  <!-- Period toggle + sort -->
  <div class="top-bar">
    <div class="period-tabs">
      <button class="period-tab active" data-period="hour">This Hour <span class="count" id="tab-count-hour"></span></button>
      <button class="period-tab"        data-period="today">Today <span class="count" id="tab-count-today"></span></button>
      <button class="period-tab"        data-period="yesterday">Yesterday <span class="count" id="tab-count-yesterday"></span></button>
    </div>
    <div class="sort-group">
      <button class="sort-btn active" data-sort="score">★ Score</button>
      <button class="sort-btn"        data-sort="time">↓ Recent</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="search" placeholder="Search jobs, companies, locations…" oninput="onSearch(this.value)" />
    </div>
    <div class="level-chips">
      <button class="chip active" data-level="all">All</button>
      <button class="chip" data-level="New Grad">New Grad</button>
      <button class="chip" data-level="Entry">Entry</button>
      <button class="chip" data-level="Mid">Mid</button>
    </div>
  </div>

  <div class="result-meta" id="result-meta"></div>

  <!-- Job list -->
  <div class="job-list" id="job-list">
    <div class="state-msg"><div class="icon">⏳</div>Loading…</div>
  </div>

</div>
</div>

<footer>
  <div class="wrapper">
    Atriveo Job Pipeline &nbsp;·&nbsp;
    <a href="/admin/">Analytics</a> &nbsp;·&nbsp;
    Runs hourly 8 AM – 1 AM
  </div>
</footer>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let hourJobs      = [];
  let todayJobs     = [];
  let yesterdayJobs = [];
  let h1bSet        = new Set();
  let prioritySet   = new Set();

  let period      = "hour";
  let sortBy      = "score";
  let levelFilter = "all";
  let query       = "";

  // ── Helpers ──────────────────────────────────────────────────────────────
  const AVATAR_COLORS = [
    "#0066FF","#0052cc","#0ea5e9","#059669","#d97706","#dc2626","#7c3aed","#db2777"
  ];
  const avatarColor = s =>
    AVATAR_COLORS[[...(s||"")].reduce((a,c) => a + c.charCodeAt(0), 0) % AVATAR_COLORS.length];

  const fmtDate = iso => {
    if (!iso || iso === "null") return null;
    const d = new Date(iso), n = new Date();
    const sameDay = (a, b) =>
      a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    if (sameDay(d, n)) return "Today";
    const yest = new Date(n - 86400000);
    if (sameDay(d, yest)) return "Yesterday";
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  };

  const scoreColor = s => s >= 12 ? "score-hi" : s >= 6 ? "score-md" : "";

  const levelClass = l => ({ "New Grad": "badge-ng", "Mid": "badge-mid" }[l] || "badge-entry");

  // Build a lookup set from a jobs array keyed by job_url
  const urlSet = jobs => new Set(jobs.map(j => j.job_url).filter(Boolean));

  // ── Render ───────────────────────────────────────────────────────────────
  function activeJobs() {
    return { hour: hourJobs, today: todayJobs, yesterday: yesterdayJobs }[period] || [];
  }

  function render() {
    let jobs = [...activeJobs()];

    // Level filter
    if (levelFilter !== "all") {
      jobs = jobs.filter(j => (j.level || "Entry") === levelFilter);
    }

    // Search
    if (query) {
      const q = query.toLowerCase();
      jobs = jobs.filter(j =>
        (j.title    || "").toLowerCase().includes(q) ||
        (j.company  || "").toLowerCase().includes(q) ||
        (j.location || "").toLowerCase().includes(q)
      );
    }

    // Sort
    if (sortBy === "score") {
      jobs.sort((a, b) => (b.score ?? b.priority_score ?? 0) - (a.score ?? a.priority_score ?? 0));
    } else {
      jobs.sort((a, b) => {
        const ta = a.date_posted ? new Date(a.date_posted).getTime() : 0;
        const tb = b.date_posted ? new Date(b.date_posted).getTime() : 0;
        return tb - ta;
      });
    }

    const list = document.getElementById("job-list");
    const meta = document.getElementById("result-meta");

    if (!jobs.length) {
      const msgs = {
        hour:      "Nothing new this hour. Next run in a bit.",
        today:     "No jobs loaded for today yet.",
        yesterday: "No data for yesterday.",
      };
      list.innerHTML = `<div class="state-msg"><div class="icon">🔍</div>${msgs[period] || "No results."}<div class="sub">Try clearing the search or changing the level filter.</div></div>`;
      meta.textContent = "";
      return;
    }

    const ngCount = jobs.filter(j => j.level === "New Grad").length;
    meta.textContent = `${jobs.length} job${jobs.length !== 1 ? "s" : ""}${ngCount ? ` · ${ngCount} New Grad` : ""}`;

    list.innerHTML = jobs.map((j, i) => {
      const co      = j.company || "—";
      const initial = co.charAt(0).toUpperCase();
      const color   = avatarColor(co);
      const score   = j.score ?? j.priority_score ?? 0;
      const lvl     = j.level || "Entry";
      const posted  = fmtDate(j.date_posted);
      const isNew   = posted === "Today";
      const isH1b   = h1bSet.has(j.job_url);
      const isPri   = prioritySet.has(j.job_url);
      const top     = i < 3 && score >= 8;

      return `<div class="job-card${top ? " top" : ""}">
        <div class="avatar" style="background:${color}">${initial}</div>
        <div class="job-main">
          <div class="job-title">
            ${j.title || "—"}
            ${isNew ? `<span class="badge badge-new">NEW</span>` : ""}
            ${isH1b ? `<span class="badge badge-h1b">H1B</span>` : ""}
            ${isPri ? `<span class="badge badge-pri">Priority</span>` : ""}
          </div>
          <div class="job-meta">
            <span style="font-weight:500;color:var(--text-2)">${co}</span>
            <span class="sep">·</span>
            <span>${j.location || "Remote"}</span>
            <span class="sep">·</span>
            <span class="badge ${levelClass(lvl)}">${lvl}</span>
            ${posted ? `<span class="sep">·</span><span>${posted}</span>` : ""}
          </div>
        </div>
        <div class="job-right">
          <div class="job-score">
            <span class="star">★</span>
            <span class="${scoreColor(score)}">${score}</span>
          </div>
          ${j.job_url
            ? `<a class="apply-btn" href="${j.job_url}" target="_blank" rel="noopener">Apply ↗</a>`
            : `<span style="font-size:12px;color:var(--muted)">—</span>`}
        </div>
      </div>`;
    }).join("");
  }

  // ── KPIs ─────────────────────────────────────────────────────────────────
  function updateKpis() {
    const hc = hourJobs.length;
    const tc = todayJobs.length;
    const ng = todayJobs.filter(j => j.level === "New Grad").length;
    const best = [...todayJobs].sort((a,b) =>
      (b.score ?? b.priority_score ?? 0) - (a.score ?? a.priority_score ?? 0)
    )[0];

    document.getElementById("kpi-hour").textContent  = hc;
    document.getElementById("kpi-today").textContent = tc || hc;
    document.getElementById("kpi-newgrad").textContent = ng;
    document.getElementById("kpi-score").textContent   = best ? (best.score ?? best.priority_score ?? 0) : "—";
    document.getElementById("kpi-score-sub").textContent = best
      ? ((best.title || "").slice(0, 22) + (best.title?.length > 22 ? "…" : ""))
      : "";

    const hrNg = hourJobs.filter(j => j.level === "New Grad").length;
    document.getElementById("kpi-hour-sub").textContent = hrNg ? `${hrNg} New Grad` : hc > 0 ? "all entry level" : "check back soon";
    document.getElementById("kpi-today-sub").textContent = tc > 0 ? `across ${Math.ceil(tc / Math.max(hc,1))} runs` : "";

    // Tab counts
    document.getElementById("tab-count-hour").textContent      = hc  ? hc  : "";
    document.getElementById("tab-count-today").textContent     = tc  ? tc  : "";
    document.getElementById("tab-count-yesterday").textContent = yesterdayJobs.length ? yesterdayJobs.length : "";
  }

  // ── Events ───────────────────────────────────────────────────────────────
  function onSearch(val) { query = val.trim(); render(); }

  document.querySelectorAll(".period-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".period-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      period = btn.dataset.period;
      render();
    });
  });

  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sortBy = btn.dataset.sort;
      render();
    });
  });

  document.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      levelFilter = btn.dataset.level;
      render();
    });
  });

  // ── Load ─────────────────────────────────────────────────────────────────
  async function loadAll() {
    try {
      const [meta, hour, today, yesterday, important, h1b] = await Promise.all([
        fetch("metadata.json").then(r => r.json()).catch(() => ({})),
        fetch("jobs.json").then(r => r.json()).catch(() => []),
        fetch("today_jobs.json").then(r => r.json()).catch(() => []),
        fetch("yesterday_jobs.json").then(r => r.json()).catch(() => []),
        fetch("important_jobs.json").then(r => r.json()).catch(() => []),
        fetch("h1b2026_jobs.json").then(r => r.json()).catch(() => []),
      ]);

      hourJobs      = hour      || [];
      todayJobs     = today.length ? today : hourJobs;
      yesterdayJobs = yesterday || [];
      h1bSet        = urlSet(h1b);
      prioritySet   = urlSet(important);

      // Header timestamp
      if (meta.last_updated) {
        const d = new Date(meta.last_updated);
        document.getElementById("last-run-text").textContent =
          "Updated " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
      }

      updateKpis();
      render();
    } catch (err) {
      document.getElementById("job-list").innerHTML =
        `<div class="state-msg"><div class="icon">⚠️</div>Could not load job data.<div class="sub">${err.message}</div></div>`;
    }
  }

  loadAll();
</script>
</body>
</html>
